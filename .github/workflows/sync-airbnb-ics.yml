name: Sync Airbnb iCal

on:
  workflow_dispatch:
  schedule:
    # Every 12 hours
    - cron: "0 */12 * * *"

permissions:
  contents: write

concurrency:
  group: sync-airbnb-ics
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch iCal
        env:
          AIRBNB_ICAL_URL: ${{ secrets.AIRBNB_ICAL_URL }}
        run: |
          set -euo pipefail

          if [[ -z "${AIRBNB_ICAL_URL:-}" ]]; then
            echo "Missing secret AIRBNB_ICAL_URL" >&2
            exit 1
          fi

          tmp="$(mktemp)"
          curl -fsSL --max-time 30 \
            -H 'User-Agent: sitewebcottage-ics-sync/1.0' \
            "$AIRBNB_ICAL_URL" \
            -o "$tmp"

          # Basic sanity check
          if ! head -n 5 "$tmp" | grep -q '^BEGIN:VCALENDAR'; then
            echo "Downloaded file does not look like an iCal (.ics)" >&2
            head -n 20 "$tmp" >&2 || true
            exit 1
          fi

          mkdir -p locales
          mv "$tmp" locales/airbnb.ics

      - name: Commit and push if changed (main)
        run: |
          set -euo pipefail

          if git diff --quiet -- locales/airbnb.ics; then
            echo "No changes in locales/airbnb.ics on main"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add locales/airbnb.ics
            git commit -m "chore: sync Airbnb iCal"
            git push
          fi

      - name: Checkout (gh-pages)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Update locales/airbnb.ics on gh-pages
        run: |
          set -euo pipefail

          mkdir -p gh-pages/locales
          cp -f locales/airbnb.ics gh-pages/locales/airbnb.ics

          # Force a "last sync" marker so the published file reflects the latest workflow run,
          # even when Airbnb returns identical content.
          synced_at="$(date -u +%Y%m%dT%H%M%SZ)"
          tmpfile="$(mktemp)"
          awk -v ts="$synced_at" '
            BEGIN{inserted=0}
            /^X-SITEWEB-SYNCED-AT:/ { next }
            { print }
            !inserted && /^VERSION:2\.0/ { print "X-SITEWEB-SYNCED-AT:" ts; inserted=1 }
            END{ if(!inserted) print "X-SITEWEB-SYNCED-AT:" ts }
          ' gh-pages/locales/airbnb.ics > "$tmpfile"
          mv "$tmpfile" gh-pages/locales/airbnb.ics

          cd gh-pages

          if [[ -z "$(git status --porcelain -- locales/airbnb.ics)" ]]; then
            echo "No changes in locales/airbnb.ics on gh-pages"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add locales/airbnb.ics
          git commit -m "chore: sync Airbnb iCal (gh-pages)"
          git push
